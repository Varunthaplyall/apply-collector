name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Python: lint + type-check + test ──────────────────────────────────
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      # Use a dummy JWT secret for tests — no real auth in CI
      SUPABASE_URL: https://ci-test.supabase.co
      SUPABASE_ANON_KEY: ci-test-key
      SUPABASE_JWT_SECRET: ci-test-jwt-secret-shared-across-repos

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install coverage[toml]

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy data_collection/

      - name: Pytest with coverage
        run: |
          pytest --cov=data_collection --cov=normalize --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Frontend: type-check + test + build ────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: web/dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run --coverage --reporter=verbose

      - name: Vite build
        run: npx vite build
